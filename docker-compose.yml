services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: parkar_app
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - AI_SERVICE_URL=http://parkar_ai:5001
      - AI_SERVICE_TIMEOUT=30
    depends_on:
      - mysql
      - mailpit
      - ai
    networks:
      - parkar

  nginx:
    image: nginx:alpine
    container_name: parkar_nginx
    ports:
      - "18080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - parkar

  mysql:
    image: mysql:8.0
    container_name: parkar_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ParKar
      MYSQL_ROOT_PASSWORD: ParKar
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - parkar

  mailpit:
    image: axllent/mailpit:latest
    container_name: parkar_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "18025:8025"
    networks:
      - parkar

  adminer:
    image: adminer:latest
    container_name: parkar_adminer
    restart: unless-stopped
    ports:
      - "18081:8080"
    depends_on:
      - mysql
    networks:
      - parkar

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    container_name: parkar_frontend
    environment:
      - VITE_PROXY_TARGET=http://nginx
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - parkar

  ai:
    build:
      context: ./parkar-ai-service
      dockerfile: ./Dockerfile
    container_name: parkar_ai
    restart: unless-stopped
    ports:
      - "5001:5001"
    networks:
      - parkar

volumes:
  mysql_data:

networks:
  parkar:
