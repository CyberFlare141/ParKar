services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    volumes:
      - .:/var/www
      - app_vendor:/var/www/vendor
    environment:
      - AI_SERVICE_URL=http://ai:5001
      - AI_SERVICE_TIMEOUT=30
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=ParKar
      - DB_USERNAME=postgres
      - DB_PASSWORD=ParKar
    depends_on:
      - postgres
      - mailpit
      - ai
    networks:
      - parkar

  nginx:
    image: nginx:alpine
    ports:
      - "18080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - parkar

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ParKar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ParKar
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - parkar

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "18025:8025"
    networks:
      - parkar

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "18081:8080"
    depends_on:
      - postgres
    networks:
      - parkar

  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    environment:
      - VITE_PROXY_TARGET=http://nginx
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - parkar

  ai:
    build:
      context: ./parkar-ai-service
      dockerfile: ./Dockerfile
    restart: unless-stopped
    ports:
      - "5002:5001"
    networks:
      - parkar

volumes:
  postgres_data:
  app_vendor:

networks:
  parkar:
