# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy PHP app to Azure Web App - ParKar-Back

env:
  AZURE_WEBAPP_NAME: ParKar-Back
  AZURE_RESOURCE_GROUP: ParKar-Database
  AZURE_STARTUP_COMMAND: bash /home/site/wwwroot/docker/azure/startup.sh

on:
  push:
    branches:
      - Dev
  workflow_dispatch:

concurrency:
  group: dev-parkar-back-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check if composer.json exists
        id: check_files
        uses: andstor/file-existence-action@v1
        with:
          files: 'composer.json'

      - name: Run composer install if composer.json exists
        if: steps.check_files.outputs.files_exists == 'true'
        run: composer validate --no-check-publish && composer install --prefer-dist --no-progress --ignore-platform-reqs

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2F169E35F94B4ADB90CBEF198668F7CD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A5813FB8FCFF4F5B82FE4F1D0ACED76F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_889BBC7C1F204999980B8226B0E188C0 }}

      - name: Configure Azure Web App for Laravel
        run: |
          az webapp config set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --linux-fx-version "PHP|8.2" \
            --startup-file "$AZURE_STARTUP_COMMAND"

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: .
